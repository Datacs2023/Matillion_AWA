        warehouse: "[Environment Default]"
        database: "[Environment Default]"
        schema: "SRC"
        targetTable: "TABLE_A_UNION_B"
        orderBy:
    Rewrite Table TABLE_A_INT_B:
      type: "rewrite-table"
      sources:
      - "Intersect"
      parameters:
        componentName: "Rewrite Table TABLE_A_INT_B"
        warehouse: "[Environment Default]"
        database: "[Environment Default]"
        schema: "SRC"
        targetTable: "TABLE_A_INT_B"
        orderBy:
    BOOKS2:
      type: "table-input"
      parameters:
        componentName: "BOOKS2"
        database: "[Environment Default]"
        schema: "[Environment Default]"
        targetTable: "BOOKS2"
        columnNames:
