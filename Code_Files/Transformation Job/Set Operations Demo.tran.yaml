  components:
    Except:
      type: "except"
      sources:
      - "BOOKS2"
      - "BOOKS1"
      parameters:
        componentName: "Except"
        castTypes: "Yes"
        primaryTable: "BOOKS1"
    Intersect:
      type: "intersect"
