type: "orchestration"
version: "1.0"
pipeline:
  components:
    Start:
      type: "start"
      transitions:
        unconditional:
        - "SQL Script"
      parameters:
        componentName: "Start"
      postProcessing:
        updateOutputMessage:
        updateScalarVariables:
        updateGridVariables:
    SQL Script:
      type: "sql-executor"
      transitions:
        success:
        - "File Iterator"
      parameters:
        componentName: "SQL Script"
        scriptLocation: "Component"
        declareSqlVariables: "Include selected"
        variablesToInclude:
        enableVariableResolution: "No"
        sqlScript: "CREATE TABLE TRANSACTIONS_NEW_ITR IF NOT EXISTS (\r\ntrans_id\
          \ INT,\t\r\naccount_id\tINT,\r\nDate\tDATE,\r\nType\tVARCHAR(30),\r\noperation\t\
          VARCHAR(40),\r\namount\tINT,\r\nbalance\tFLOAT,\r\nPurpose\tVARCHAR(40),\r\
          \nbank\tVARCHAR(45),\r\naccount INT);"
      postProcessing:
        updateOutputMessage:
        updateScalarVariables:
        updateGridVariables:
    S3 Load:
      type: "s3-load"
      parameters:
        componentName: "S3 Load"
        stage: "[Custom]"
        authentication: "Credentials"
        s3ObjectPrefix: "s3://anuragawa/matillion/transaction_awa/${filename_1}"
        pattern: ".*\\.csv"
        encryption: "None"
        warehouse: "[Environment Default]"
        database: "[Environment Default]"
        schema: "[Environment Default]"
        targetTable: "TRANSACTIONS_NEW_ITR"
        loadColumns:
        - "TRANS_ID"
        - "ACCOUNT_ID"
        - "DATE"
        - "TYPE"
        - "OPERATION"
        - "AMOUNT"
        - "BALANCE"
        - "PURPOSE"
        - "BANK"
        - "ACCOUNT"
        format: "[Custom]"
        fileType: "CSV"
        compression: "AUTO"
        recordDelimiter:
        fieldDelimiter: ","
        skipHeader: "1"
        skipBlankLines: "False"
        dateFormat:
        timeFormat:
        timestampFormat:
        escape:
        escapeUnenclosedField:
        trimSpace: "False"
        fieldOptionallyEnclosed:
        nullIf:
        errorOnColumnCountMismatch: "True"
        emptyFieldAsNull: "True"
        replaceInvalidCharacters: "False"
        encodingType:
        onError: "Abort Statement"
        sizeLimitB:
        purgeFiles: "False"
        truncateColumns: "False"
        forceLoad: "False"
      postProcessing:
        updateOutputMessage:
        updateScalarVariables:
        updateGridVariables:
    File Iterator:
      type: "file-iterator"
      iterationTarget: "S3 Load"
      parameters:
        componentName: "File Iterator"
        inputDataType: "S3"
        maxIterations: "6"
        filterRegex: ".*.csv"
        concurrency: "Sequential"
        variables:
        - - "filename_1"
          - "Filename"
        breakOnFailure: "Yes"
        stopOnCondition: "No"
        recordValuesInTaskHistory: "Yes"
        recursive: "Yes"
        inputDataUrl1: "s3://anuragawa/matillion/transaction_awa"
      postProcessing:
        updateOutputMessage:
        updateScalarVariables:
        updateGridVariables:
  variables:
    filename_1:
      metadata:
        type: "TEXT"
        description: "pass values"
        scope: "SHARED"
        visibility: "PUBLIC"
      defaultValue: "trnx_16.csv"
design:
  components:
    Start:
      position:
        x: -930
        "y": 0
      tempMetlId:
    SQL Script:
      position:
        x: -840
        "y": 0
      tempMetlId:
    S3 Load:
      position:
        x: -680
        "y": 0
      tempMetlId:
    File Iterator:
      position:
        x: -680
        "y": -20
      tempMetlId:
